<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-label="VitalSite checks three pillars of website health: Security, Visibility and Accessibility">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="1000" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#030712"/><stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="vac" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff"/><stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="400" fill="url(#vbg)"/>
  <g stroke="#00e5ff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1000" y2="100"/><line x1="0" y1="200" x2="1000" y2="200"/><line x1="0" y1="300" x2="1000" y2="300"/>
  </g>
  <text x="500" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" letter-spacing="4" fill="#00e5ff">VITALSITE — WEBSITE HEALTH SCANNER</text>
  <text x="500" y="92" text-anchor="middle" font-family="Outfit, sans-serif" font-size="26" font-weight="800" fill="#f1f5f9">The three pillars of a healthy site</text>

  <g>
    <rect x="70" y="140" width="260" height="200" rx="16" fill="rgba(15,23,42,0.6)" stroke="url(#vac)" stroke-width="1.5"/>
    <text x="200" y="205" text-anchor="middle" font-size="52">🔒</text>
    <text x="200" y="250" text-anchor="middle" font-family="Outfit, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Security</text>
    <text x="200" y="282" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" fill="#94a3b8">SSL/TLS · headers · HTTPS</text>
    <text x="200" y="303" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" fill="#94a3b8">malware &amp; CVE checks</text>
  </g>
  <g>
    <rect x="370" y="140" width="260" height="200" rx="16" fill="rgba(15,23,42,0.6)" stroke="url(#vac)" stroke-width="1.5"/>
    <text x="500" y="205" text-anchor="middle" font-size="52">🔎</text>
    <text x="500" y="250" text-anchor="middle" font-family="Outfit, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Visibility</text>
    <text x="500" y="282" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" fill="#94a3b8">robots · sitemap · indexing</text>
    <text x="500" y="303" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" fill="#94a3b8">crawlable, trusted pages</text>
  </g>
  <g>
    <rect x="670" y="140" width="260" height="200" rx="16" fill="rgba(15,23,42,0.6)" stroke="url(#vac)" stroke-width="1.5"/>
    <text x="800" y="205" text-anchor="middle" font-size="52">♿</text>
    <text x="800" y="250" text-anchor="middle" font-family="Outfit, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Accessibility</text>
    <text x="800" y="282" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" fill="#94a3b8">standards &amp; usability</text>
    <text x="800" y="303" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" fill="#94a3b8">for humans and machines</text>
  </g>
</svg>
